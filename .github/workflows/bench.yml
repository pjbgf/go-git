name: Go Benchmark
on:
  pull_request:

permissions: {}

jobs:
  benchmark:
    name: Run Go benchmark
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v4
        with:
          go-version: "stable"
      
      - name: Download previous benchmark data
        uses: actions/cache@v4
        with:
          path: ./cache
          key: ${{ runner.os }}-benchmark

      - name: Set Git config
        run: |
          git config --global user.email "gha@example.com"
          git config --global user.name "GitHub Actions"

      - name: Run benchmark
        # Baseline benchmark are prefixed with "BenchmarkBase",
        # only run them on regression testing.
        run: go test -bench 'BenchmarkBase' | tee output.txt

      - name: Store benchmark result
        uses: benchmark-action/github-action-benchmark@d48d326b4ca9ba73ca0cd0d59f108f9e02a381c7 # v1.20.4
        with:
          name: Go Benchmark
          tool: 'go'
          output-file-path: output.txt
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: false
          alert-threshold: '120%'
          comment-on-alert: true
          summary-always: true
          fail-on-alert: true
          alert-comment-cc-users: '@pjbgf'
